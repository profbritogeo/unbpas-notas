  <script>
    const defaultConfig = {
      page_title: 'Selecione sua modalidade',
      background_color: '#0f172a',
      card_color: '#1e293b',
      text_color: '#f1f5f9',
      accent_color: '#2563eb',
      border_color: '#334155',
      font_family: 'DM Sans',
      font_size: 18
    };

    function applyConfig(config) {
      const title = document.getElementById('title');
      title.textContent = config.page_title || defaultConfig.page_title;

      const app = document.getElementById('app');
      app.style.backgroundColor = config.background_color || defaultConfig.background_color;

      const font = config.font_family || defaultConfig.font_family;
      const size = config.font_size || defaultConfig.font_size;
      title.style.fontFamily = `${font}, sans-serif`;
      title.style.fontSize = `${size * 1.4}px`;
      title.style.color = config.text_color || defaultConfig.text_color;

      document.querySelectorAll('.option-card').forEach(card => {
        card.style.backgroundColor = config.card_color || defaultConfig.card_color;
        card.style.color = config.text_color || defaultConfig.text_color;
        card.style.borderColor = config.border_color || defaultConfig.border_color;
        card.style.fontFamily = `${font}, sans-serif`;
        card.style.fontSize = `${size}px`;
      });
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.card_color || defaultConfig.card_color, set: (v) => { config.card_color = v; window.elementSdk.setConfig({ card_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.border_color || defaultConfig.border_color, set: (v) => { config.border_color = v; window.elementSdk.setConfig({ border_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['page_title', config.page_title || defaultConfig.page_title]
      ])
    });
  </script>
